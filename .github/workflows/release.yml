name: Release

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.0.1)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            features: metal
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            features: metal
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            features: ""
            archive: tar.gz
            deps: libasound2-dev
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            features: ""
            archive: tar.gz
            cross: true
            deps: gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            features: ""
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: matrix.deps != ''
        run: |
          sudo dpkg --add-architecture arm64 || true
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.deps }}

      - name: Install ALSA cross-compile deps (Linux ARM64)
        if: matrix.cross == true
        run: |
          # Add arm64 architecture and install cross-compile ALSA
          sudo dpkg --add-architecture arm64
          # Add arm64 package sources
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list.d/*.list || true
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs) main restricted universe" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs)-updates main restricted universe" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y libasound2-dev:arm64
        env:
          PKG_CONFIG_ALLOW_CROSS: 1

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }}

      - name: Build (cross)
        if: matrix.cross == true
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: 1
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../vox-${{ matrix.target }}.${{ matrix.archive }} vox
          cd ../../..

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../vox-${{ matrix.target }}.zip vox.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vox-${{ matrix.target }}
          path: vox-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Upload Release Assets
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get tag
        id: version
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.release.tag_name }}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::No tag found"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          echo "=== Release assets ==="
          ls -lh release/

      - name: Create checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload to existing release
        run: gh release upload "$TAG" release/* --clobber --repo "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}

  homebrew:
    name: Update Homebrew formula
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download checksums
        run: |
          gh release download "${{ steps.version.outputs.tag }}" \
            --repo rtk-ai/vox \
            --pattern checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse checksums
        id: sha
        run: |
          echo "arm=$(grep aarch64-apple-darwin checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "intel=$(grep x86_64-apple-darwin checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux=$(grep x86_64-unknown-linux-gnu checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          cat > vox.rb << 'FORMULA'
          class Vox < Formula
            desc "Cross-platform TTS CLI — local voice synthesis with three backends"
            homepage "https://github.com/rtk-ai/vox"
            version "VERSION_PLACEHOLDER"
            license "Apache-2.0"

            on_macos do
              on_intel do
                url "https://github.com/rtk-ai/vox/releases/download/TAG_PLACEHOLDER/vox-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_INTEL_PLACEHOLDER"
              end
              on_arm do
                url "https://github.com/rtk-ai/vox/releases/download/TAG_PLACEHOLDER/vox-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_ARM_PLACEHOLDER"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/rtk-ai/vox/releases/download/TAG_PLACEHOLDER/vox-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_LINUX_PLACEHOLDER"
              end
            end

            def install
              bin.install "vox"
            end

            test do
              assert_match "vox #{version}", shell_output("#{bin}/vox --version")
            end
          end
          FORMULA
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" vox.rb
          sed -i "s/TAG_PLACEHOLDER/$TAG/g" vox.rb
          sed -i "s/SHA_INTEL_PLACEHOLDER/${{ steps.sha.outputs.intel }}/g" vox.rb
          sed -i "s/SHA_ARM_PLACEHOLDER/${{ steps.sha.outputs.arm }}/g" vox.rb
          sed -i "s/SHA_LINUX_PLACEHOLDER/${{ steps.sha.outputs.linux }}/g" vox.rb
          # Remove leading spaces from heredoc
          sed -i 's/^          //' vox.rb

      - name: Push to homebrew-tap
        run: |
          CONTENT=$(base64 -w 0 vox.rb)
          SHA=$(gh api repos/rtk-ai/homebrew-tap/contents/Formula/vox.rb --jq '.sha' 2>/dev/null || echo "")
          if [ -n "$SHA" ]; then
            gh api -X PUT repos/rtk-ai/homebrew-tap/contents/Formula/vox.rb \
              -f message="vox ${{ steps.version.outputs.version }}" \
              -f content="$CONTENT" \
              -f sha="$SHA"
          else
            gh api -X PUT repos/rtk-ai/homebrew-tap/contents/Formula/vox.rb \
              -f message="vox ${{ steps.version.outputs.version }}" \
              -f content="$CONTENT"
          fi
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
