name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Metal)
            os: macos-latest
            features: metal
            deps: ""
          - name: Linux (CPU)
            os: ubuntu-latest
            features: ""
            no_default_features: true
            deps: libasound2-dev
          - name: Windows (CPU)
            os: windows-latest
            features: ""
            deps: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (Linux)
        if: matrix.deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build ${{ matrix.no_default_features == true && '--no-default-features' || '' }} ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }}

      - name: Run tests
        run: cargo test ${{ matrix.no_default_features == true && '--no-default-features' || '' }} ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy ${{ matrix.no_default_features == true && '--no-default-features' || '' }} ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }} -- -D warnings
