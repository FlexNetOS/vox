name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # CUDA matrix entries are best-effort: GH-hosted runners' kernel mismatch
    # currently breaks nvidia-dkms (Jimver/cuda-toolkit action). Mirror the
    # non-blocking behavior already applied in release.yml.
    continue-on-error: ${{ matrix.cuda == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Metal)
            os: macos-latest
            features: metal
            deps: ""
          - name: Linux (CPU)
            os: ubuntu-latest
            features: ""
            deps: libasound2-dev
          - name: Linux (CUDA)
            os: ubuntu-latest
            features: cuda
            deps: libasound2-dev
            cuda: true
          - name: Windows (CPU)
            os: windows-latest
            features: ""
            deps: ""
          - name: Windows (CUDA)
            os: windows-latest
            features: cuda
            cuda: true
            deps: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (Linux)
        if: matrix.deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}

      - name: Install CUDA toolkit
        if: matrix.cuda == true
        uses: Jimver/cuda-toolkit@v0.2.22
        with:
          cuda: '12.6.3'
          method: network

      # esaxx-rs forces /MT via .static_crt(true) but ort-sys prebuilt links
      # against /MD. Force /MD on Windows so cc's last flag wins and the
      # CRT matches ort-sys. Without this, link fails with LNK2038.
      - name: Set Windows MSVC runtime flags
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "CFLAGS=/MD" >> $env:GITHUB_ENV
          echo "CXXFLAGS=/MD" >> $env:GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.features }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }}
        env:
          CUDA_COMPUTE_CAP: ${{ matrix.cuda == true && '89' || '' }}

      - name: Run tests
        run: cargo test ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }}
        env:
          CUDA_COMPUTE_CAP: ${{ matrix.cuda == true && '89' || '' }}

      - name: Check formatting
        if: matrix.cuda != true
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }} -- -D warnings -A clippy::collapsible_if -A clippy::collapsible_match
        env:
          CUDA_COMPUTE_CAP: ${{ matrix.cuda == true && '89' || '' }}
